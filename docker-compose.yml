services:
  db:
    image: postgres:16-alpine
    container_name: fintech_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-fintech_app}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # El healthcheck verifica si Postgres realmente acepta conexiones
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-fintech_app}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:16-alpine
    container_name: fintech_db_test
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_TEST_NAME:-fintech_app_test}
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    # El healthcheck verifica si Postgres realmente acepta conexiones
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_TEST_NAME:-fintech_app_test}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintech_api
    depends_on:
      db:
        condition: service_healthy # Espera a que el healthcheck de 'db' sea exitoso
    environment:
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-password123}@db:5432/${DB_NAME:-fintech_app}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"

  backend_test:
    build: 
      context: ./backend
      dockerfile: Dockerfile
      target: dev # Usa la etapa de desarrollo para tener acceso a Jest y otras dependencias de desarrollo
    container_name: fintech_api_test
    depends_on:
      db_test:
        condition: service_healthy # Espera a que el healthcheck de 'db_test' sea exitoso
    environment:
      NODE_ENV: test
      DB_HOST: db_test
      DB_PORT: 5432
      DB_NAME: ${DB_TEST_NAME:-fintech_app_test}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      JWT_SECRET: test_secret_key_for_testing
      JWT_EXPIRES_IN: 1h
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm test

volumes:
  postgres_data:
  postgres_test_data:
